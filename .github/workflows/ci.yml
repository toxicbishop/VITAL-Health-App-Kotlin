name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android (KMP)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDKs (21 for runner, 25 for toolchain)
        uses: actions/setup-java@v4
        with:
          java-version: |
            21
            25
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create .env file
        run: |
          {
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}"
          } > .env

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload Android Build Artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  # Note: iOS build requires macOS runner and is often skipped in free tier CI
  # unless specifically requested due to high minute usage.
  # check-ios:
  #   name: Check iOS (KMP)
  #   runs-on: macos-latest
  #   steps:
  #     ...
